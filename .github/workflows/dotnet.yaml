name: DotnetProject
on: [push,workflow_dispatch]
jobs:
 dotnetdeployment:
   runs-on: self-hosted
   steps:
     - name: checkout
       uses: actions/checkout@v6.0.2
       with:
        ref: master
     - name: workingdir
       run:  pwd
     - name: docker compose down
       run: docker compose -f docker-compose.yml down
     - name: Remove images
       run: docker rmi $(docker images -q)
     - name: docker compose down
       run: docker compose -f docker-compose.yml up -d  




